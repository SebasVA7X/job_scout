services:
  jobscraper:
    build: JobScout_Docker
    container_name: job-scout
    restart: unless-stopped

    env_file:
      - .env

    user: "1000:1000"

    environment:
      TZ: America/Guayaquil

    volumes:
      # Persistent DB and logs — survives container restarts/updates
      - ./data:/app/data
      - ./logs:/app/logs

    # Resource limits — Pi 5 has 8GB but let's be conservative
    deploy:
      resources:
        limits:
          memory: 512M

    # Health check — verifies the process is alive
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/jobs.db').execute('SELECT 1')"]
      interval: 30m
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
